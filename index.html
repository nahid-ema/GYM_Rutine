        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-color: #38bdf8;
            --accent-gradient: linear-gradient(90deg, #38bdf8 0%, #818cf8 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success-color: #4ade80;
            --danger-color: #f87171;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .app-root {
          font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
          background: var(--bg-gradient);
          background-attachment: fixed;
          color: var(--text-main);
          min-height: 100vh;
          padding: 24px 16px 110px;
          display: flex;
          flex-direction: column;
          align-items: center;
          overflow-x: hidden;
          width: 100%;
        }
        .container { width: 100%; max-width: 520px; min-width: 0; overflow: hidden; }
        header { text-align: center; margin-bottom: 20px; }
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            text-transform: uppercase;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .stats-banner { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; letter-spacing: 0.05em; }
        .stats-banner span { color: var(--accent-color); font-weight: 700; }

        .view { display:none }
        .view.active { display:block; animation: fadeIn 0.25s ease }
        @keyframes fadeIn { from { opacity:0; transform: translateY(6px)} to { opacity:1; transform: translateY(0)} }

        /* Weekly Card + History Card shared base */
        .weekly-card, .history-card {
          background: var(--card-bg);
          backdrop-filter: blur(16px);
          -webkit-backdrop-filter: blur(16px);
          border: 1px solid var(--card-border);
          border-radius: 24px;
          padding: 20px 24px;
          margin-bottom: 20px;
          box-shadow: 0 10px 30px rgba(0,0,0,0.25);
          width: 100%;
          max-width: 100%;
          min-width: 0;
          overflow: hidden;
        }
        .weekly-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; gap:12px; }
        .weekly-title { font-size: 0.75rem; text-transform: uppercase; font-weight: 700; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 3px; }
        .weekly-subtitle { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
        .weekly-pct-badge { background: var(--accent-gradient); color: #0f172a; font-weight: 800; padding: 6px 12px; border-radius: 999px; font-size: 0.9rem; min-width: 48px; text-align: center; box-shadow: 0 4px 10px rgba(56,189,248,0.25); }
        .weekly-days-grid { display: grid; grid-template-columns: repeat(7,minmax(0,1fr)); gap: 8px; margin-bottom: 18px; width: 100%; }
        .w-day { display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 10px 2px; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px solid transparent; transition: all 0.2s ease; user-select: none; min-width: 0; overflow: hidden; }
        .w-day:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.06); transform: translateY(-1px); }
        .w-day.active-day { border-color: rgba(56,189,248,0.35); background: rgba(56,189,248,0.10); box-shadow: 0 0 0 1px rgba(56,189,248,0.15) inset; }
        .w-day.completed { background: rgba(74,222,128,0.08); }
        .w-day-label { font-size: 0.56rem; font-weight: 700; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 8px; white-space: nowrap; }
        .w-day.active-day .w-day-label { color: var(--accent-color); }
        .w-day-ring { width: 36px; height: 36px; border-radius: 50%; display: grid; place-items: center; font-size: 0.70rem; font-weight: 700; margin-bottom: 6px; border: 2px solid rgba(255,255,255,0.08); color: var(--text-muted); background: rgba(255,255,255,0.02); transition: all 0.2s ease; }
        .w-day-ring.done { border-color: var(--success-color); color: var(--success-color); background: rgba(74,222,128,0.15); }
        .w-day-count { font-size: 0.58rem; font-weight: 600; color: var(--text-muted); letter-spacing: 0.01em; white-space: nowrap; }
        .w-day.completed .w-day-count { color: var(--text-main); }
        .weekly-stats-row { display: flex; background: rgba(255,255,255,0.03); border-radius: 14px; padding: 12px 8px; justify-content: space-around; align-items: center; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.04); }
        .w-stat { text-align: center; flex: 1; }
        .w-stat-val { display: block; font-weight: 800; font-size: 1.1rem; color: var(--text-main); line-height: 1.2; }
        .w-stat-label { font-size: 0.65rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em; font-weight: 600; margin-top: 2px; display: block; }
        .w-stat-divider { width: 1px; align-self: stretch; background: rgba(255,255,255,0.06); margin: 0 4px; }
        .weekly-chart { display: flex; align-items: end; gap: 6px; height: 64px; width: 100%; }
        .w-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: end; min-width: 0; }
        .w-bar { width: 100%; background: rgba(255,255,255,0.06); border-radius: 6px 6px 2px 2px; position: relative; overflow: hidden; height: 48px; display: flex; align-items: end; min-width: 0; }
        .w-bar-fill { width: 100%; background: var(--accent-gradient); border-radius: 6px 6px 2px 2px; transition: height 0.45s cubic-bezier(0.4,0,0.2,1); min-height: 2px; }
        .w-bar-fill.rest { background: linear-gradient(180deg, rgba(148,163,184,0.45), rgba(148,163,184,0.18)); }
        .w-bar-fill.done-bar { box-shadow: 0 0 10px rgba(56,189,248,0.35); }
        .w-bar-label { font-size: 0.6rem; color: var(--text-muted); font-weight: 600; letter-spacing: 0.03em; }

        .progress-container { background: rgba(255,255,255,0.05); border-radius: 999px; height: 6px; margin-bottom: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.03); width: 100%; }
        .progress-bar { height: 100%; width: 0%; background: var(--accent-gradient); transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .day-selector { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 16px; scrollbar-width: none; width: 100%; max-width: 100%; }
        .day-selector::-webkit-scrollbar { display: none; }
        .day-btn { background: rgba(255, 255, 255, 0.03); color: var(--text-muted); border: 1px solid var(--card-border); padding: 10px 18px; border-radius: 14px; cursor: pointer; font-weight: 600; font-size: 0.9rem; white-space: nowrap; transition: all 0.2s ease; flex-shrink: 0; }
        .day-btn:hover { background: rgba(255, 255, 255, 0.08); color: var(--text-main); }
        .day-btn.active { background: var(--text-main); color: #0f172a; border-color: var(--text-main); box-shadow: 0 4px 12px rgba(255,255,255,0.15); }
        .workout-card { background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--card-border); border-radius: 24px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); margin-bottom: 20px; width: 100%; max-width: 100%; min-width: 0; overflow: hidden; }
        .day-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 20px; letter-spacing: -0.01em; }
        .exercise-row { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 16px; padding: 16px; margin-bottom: 14px; transition: transform 0.2s ease; }
        .exercise-row:last-child { margin-bottom: 0; }
        .exercise-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; gap: 12px; }
        .exercise-name { font-size: 1.05rem; font-weight: 600; color: var(--text-main); line-height: 1.25; }
        .exercise-tag { font-size: 0.7rem; text-transform: uppercase; padding: 3px 8px; border-radius: 6px; font-weight: 700; letter-spacing: 0.05em; background: rgba(56, 189, 248, 0.15); color: var(--accent-color); flex-shrink: 0; }
        .exercise-meta { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 14px; line-height: 1.45; }
        .sets-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 8px; }
        .set-box { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.06); padding: 10px 0; border-radius: 10px; font-size: 0.85rem; font-weight: 600; text-align: center; cursor: pointer; user-select: none; transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); color: var(--text-muted); }
        .set-box:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.15); }
        .set-box.done { background: var(--accent-gradient); color: #0f172a; border-color: transparent; font-weight: 700; box-shadow: 0 4px 10px rgba(56, 189, 248, 0.2); }
        .timer-container { background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--card-border); border-radius: 20px; padding: 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 12px; width: 100%; max-width: 100%; }
        .timer-left { display: flex; flex-direction: column; gap: 2px; }
        .timer-label { font-size: 0.75rem; text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; color: var(--text-muted); }
        .timer-display { font-size: 1.6rem; font-weight: 700; font-family: ui-monospace, SFMono-Regular, monospace; color: var(--text-main); }
        .timer-controls { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
        .t-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); color: var(--text-main); padding: 8px 12px; border-radius: 10px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
        .t-btn:hover { background: rgba(255,255,255,0.08); }
        .t-btn.stop { background: rgba(248, 113, 113, 0.15); border-color: rgba(248, 113, 113, 0.2); color: var(--danger-color); }
        .log-btn { width: 100%; max-width: 100%; background: var(--accent-gradient); color: #0f172a; border: none; padding: 16px; border-radius: 16px; font-size: 1rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.25); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .log-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(56, 189, 248, 0.4); }
        .log-btn:active { transform: translateY(1px); }

        /* History Card specific */
        .history-header-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 12px; }
        .history-reset { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.2); color: var(--danger-color); padding: 6px 12px; border-radius: 999px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; cursor: pointer; transition: all 0.2s ease; }
        .history-reset:hover { background: rgba(248,113,113,0.18); }
        .history-list-wrap { max-height: 360px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; scrollbar-width: thin; }
        .history-list-wrap::-webkit-scrollbar { width: 4px; } .history-list-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
        .h-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: rgba(255,255,255,0.03); border-radius: 10px; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.03); }
        .h-item-left { display:flex; flex-direction:column; gap:2px; }
        .h-date { font-weight:700; color: var(--text-main); font-size:0.82rem; }
        .h-title { font-size:0.70rem; color: var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:180px; }
        .h-badge { background: var(--accent-gradient); color:#0f172a; font-weight:800; font-size:0.72rem; padding:4px 8px; border-radius:999px; min-width:42px; text-align:center; }
        .h-empty { text-align:center; padding:18px 10px; color: var(--text-muted); font-size:0.85rem; border:1px dashed rgba(255,255,255,0.08); border-radius:12px; }
        .history-footer { font-size:0.68rem; color: var(--text-muted); text-align:center; margin-top:14px; letter-spacing:0.03em; }

        .bottom-nav {
          position: fixed;

          margin: 0 auto;
          background: rgba(15,23,42,0.85);
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
          border-top: 1px solid var(--card-border);
          border-left: 1px solid var(--card-border);
          border-right: 1px solid var(--card-border);
          border-radius: 24px 24px 0 0;
          display: flex;

          flex: 1;
          display: flex;
          flex-direction: column;
          gap: 4px;
          align-items: center;
          background: transparent;
          border: none;
          color: var(--text-muted);
          font-size: 0.65rem;
          text-transform: uppercase;
          font-weight: 700;
          letter-spacing: 0.06em;
          cursor: pointer;
          padding: 8px 24px;
          border-radius: 14px;
          transition: all 0.2s ease;
        }
